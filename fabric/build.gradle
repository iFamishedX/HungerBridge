plugins {
    id "fabric-loom" version "1.7-SNAPSHOT"
}

buildscript {
    repositories {
        mavenCentral()
    }
    dependencies {
        classpath 'com.fasterxml.jackson.dataformat:jackson-dataformat-yaml:2.17.0'
    }
}

import com.fasterxml.jackson.dataformat.yaml.YAMLMapper

def mapper = new YAMLMapper()
def versionFile = file("${rootDir}/version.yaml")

if (!versionFile.exists()) {
    throw new GradleException("version.yaml missing at: ${versionFile}")
}

def versionData = mapper.readValue(versionFile, Map)
project.version = versionData.version

dependencies {
    minecraft "com.mojang:minecraft:1.21.11"
    mappings loom.officialMojangMappings()

    modImplementation "net.fabricmc:fabric-loader:0.19.2"

    implementation project(":common")
}

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(21)
    }
}

loom {
    runs {
        server {
            server()
            name "HungerBridge Server"
        }
    }
}

processResources {
    inputs.property "version", project.version

    filesMatching("fabric.mod.json") {
        expand "version": project.version
    }
}

jar {
    from(project(":common").sourceSets.main.output)

    manifest {
        attributes(
            "Can-Redefine-Classes": "true",
            "Can-Retransform-Classes": "true"
        )
    }
}
