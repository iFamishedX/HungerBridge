name: Generate Wrapper

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  gen:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Create empty settings-wrapper.gradle
        run: echo "" > settings-wrapper.gradle

      - name: Generate Gradle Wrapper (8.10.2)
        run: gradle wrapper --gradle-version 8.10.2 -c settings-wrapper.gradle

      - name: Make wrapper executable
        run: chmod +x gradlew

      - name: Commit wrapper files
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Add Gradle wrapper (8.10.2)"
          add_options: "-A"
          file_pattern: |
            gradlew
            gradlew.bat
            gradle/wrapper/gradle-wrapper.jar
            gradle/wrapper/gradle-wrapper.properties
