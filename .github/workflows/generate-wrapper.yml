name: Generate Wrapper

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  gen-wrapper:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Download standalone Gradle 8.10.2
        run: |
          wget https://services.gradle.org/distributions/gradle-8.10.2-bin.zip
          unzip gradle-8.10.2-bin.zip
          mv gradle-8.10.2 gradle-standalone

      - name: Create empty temp project
        run: |
          mkdir temp-wrapper
          cd temp-wrapper
          echo "rootProject.name = 'temp'" > settings.gradle

      - name: Generate wrapper using standalone Gradle
        run: |
          cd temp-wrapper
          ../gradle-standalone/bin/gradle wrapper --gradle-version 8.10.2 --distribution-type bin

      - name: Copy wrapper into repo
        run: |
          cp temp-wrapper/gradlew .
          cp temp-wrapper/gradlew.bat .
          mkdir -p gradle/wrapper
          cp temp-wrapper/gradle/wrapper/* gradle/wrapper/

      - name: Commit wrapper
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Add Gradle wrapper (generated on CI)"
          add_options: "-A"
          file_pattern: |
            gradlew
            gradlew.bat
            gradle/wrapper/gradle-wrapper.jar
            gradle/wrapper/gradle-wrapper.properties
