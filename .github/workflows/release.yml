name: Versioned Release

on:
  push:
    branches:
      - main
      - dev
      - master

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    if: ${{ !contains(github.event.head_commit.message, 'Merge pull request') }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install yq
        run: |
          curl -sL https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64 \
            -o /usr/local/bin/yq
          chmod +x /usr/local/bin/yq

      - name: Parse version.yaml
        run: |
          echo "RUN=$(yq '.run' version.yaml)" >> $GITHUB_ENV
          echo "VERSION=$(yq '.version' version.yaml)" >> $GITHUB_ENV
          echo "MC_VERSION=$(yq '.mc_version' version.yaml)" >> $GITHUB_ENV
          echo "DESC<<EOF" >> $GITHUB_ENV
          yq '.description' version.yaml >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Stop if run=false
        if: ${{ env.RUN == 'false' }}
        run: echo "run=false → skipping release."

      - name: Set up JDK 21
        if: ${{ env.RUN == 'true' }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Gradle
        if: ${{ env.RUN == 'true' }}
        uses: gradle/actions/setup-gradle@v3
        with:
          cache-read-only: false

      - name: Build HungerBridge
        if: ${{ env.RUN == 'true' }}
        run: |
          gradle clean build --no-daemon

      - name: Prepare artifacts
        if: ${{ env.RUN == 'true' }}
        run: |
          mkdir -p release

          PAPER_JAR="HungerBridge-paper-${VERSION}+${MC_VERSION}.jar"
          FABRIC_JAR="HungerBridge-fabric-${VERSION}+${MC_VERSION}.jar"

          cp paper/build/libs/*.jar release/${PAPER_JAR}
          cp fabric/build/libs/*.jar release/${FABRIC_JAR}

          echo "PAPER_JAR=${PAPER_JAR}" >> $GITHUB_ENV
          echo "FABRIC_JAR=${FABRIC_JAR}" >> $GITHUB_ENV

      - name: Create GitHub Release
        if: ${{ env.RUN == 'true' }}
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}
          skip_checkout: true
          tag_name: ${{ env.VERSION }}
          name: ${{ env.VERSION }}
          body: ${{ env.DESC }}
          files: |
            release/${{ env.PAPER_JAR }}
            release/${{ env.FABRIC_JAR }}
