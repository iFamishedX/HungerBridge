name: Versioned Release

on:
  push:
    branches:
      - main
      - dev
      - master

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    if: ${{ !contains(github.event.head_commit.message, 'Merge pull request') }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install yq
        run: |
          curl -sL https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64 \
            -o /usr/local/bin/yq
          chmod +x /usr/local/bin/yq

      - name: Parse version.yaml
        run: |
          # Use yq eval -r to get raw strings without quotes/newlines
          echo "RUN=$(yq eval -r '.run' version.yaml)" >> $GITHUB_ENV
          echo "VERSION=$(yq eval -r '.version' version.yaml)" >> $GITHUB_ENV
          echo "MC_VERSION=$(yq eval -r '.mc_version' version.yaml)" >> $GITHUB_ENV
          # Preserve multiline description into DESC env var
          echo "DESC<<'DESC_EOF'" >> $GITHUB_ENV
          yq eval -r '.description' version.yaml >> $GITHUB_ENV
          echo "DESC_EOF" >> $GITHUB_ENV

      - name: Stop if run=false
        if: ${{ env.RUN == 'false' }}
        run: echo "run=false → skipping release."

      - name: Set up JDK 21
        if: ${{ env.RUN == 'true' }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Ensure Gradle wrapper exists
        if: ${{ env.RUN == 'true' }}
        run: |
          if [ ! -f ./gradlew ]; then
            echo "Gradle wrapper not found. Generate locally and commit, or run the generate-wrapper workflow."
            exit 1
          fi
          chmod +x ./gradlew

      - name: Build HungerBridge
        if: ${{ env.RUN == 'true' }}
        run: |
          ./gradlew clean build --no-daemon

      - name: Prepare artifacts
        if: ${{ env.RUN == 'true' }}
        run: |
          mkdir -p release

          PAPER_JAR="HungerBridge-paper-${VERSION}+${MC_VERSION}.jar"
          FABRIC_JAR="HungerBridge-fabric-${VERSION}+${MC_VERSION}.jar"

          # Fail early if expected jars are missing
          if compgen -G "paper/build/libs/*.jar" > /dev/null; then
            cp paper/build/libs/*.jar "release/${PAPER_JAR}"
          else
            echo "Paper jar not found in paper/build/libs" >&2
            exit 1
          fi

          if compgen -G "fabric/build/libs/*.jar" > /dev/null; then
            cp fabric/build/libs/*.jar "release/${FABRIC_JAR}"
          else
            echo "Fabric jar not found in fabric/build/libs" >&2
            exit 1
          fi

          echo "PAPER_JAR=${PAPER_JAR}" >> $GITHUB_ENV
          echo "FABRIC_JAR=${FABRIC_JAR}" >> $GITHUB_ENV

      - name: Create GitHub Release
        if: ${{ env.RUN == 'true' }}
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}
          skip_checkout: true
          tag_name: ${{ env.VERSION }}
          name: ${{ env.VERSION }}
          body: ${{ env.DESC }}
          files: |
            release/${{ env.PAPER_JAR }}
            release/${{ env.FABRIC_JAR }}
